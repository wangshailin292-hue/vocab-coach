<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#f5f3ef">
<title>词句练习室</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="app">

  <!-- HOME (default landing) -->
  <section id="homeView" class="panel active">
    <div class="home-head">
      <h1>词句练习室</h1>
      <p class="home-sub">每天一点，积少成多</p>
    </div>
    <div class="home-cards">
      <div class="home-card study-entry" data-action="study">
        <div class="hc-icon">📖</div>
        <div class="hc-label">开始复习</div>
        <div class="hc-sub" id="homeDueBadge">今日 0 词</div>
      </div>
      <div class="home-card" data-nav="library">
        <div class="hc-icon">📚</div>
        <div class="hc-label">词库</div>
        <div class="hc-sub" id="homeTotalBadge">0 词</div>
      </div>
      <div class="home-card" data-nav="read">
        <div class="hc-icon">📰</div>
        <div class="hc-label">阅读</div>
        <div class="hc-sub">AI 生成文章</div>
      </div>
      <div class="home-card" data-nav="essay">
        <div class="hc-icon">✍️</div>
        <div class="hc-label">批改</div>
        <div class="hc-sub">AI 批改作文</div>
      </div>
      <div class="home-card" data-nav="habits">
        <div class="hc-icon">📊</div>
        <div class="hc-label">习惯</div>
        <div class="hc-sub">薄弱项分析</div>
      </div>
      <div class="home-card" data-nav="settings">
        <div class="hc-icon">⚙️</div>
        <div class="hc-label">设置</div>
        <div class="hc-sub">API · 间隔</div>
      </div>
    </div>
  </section>

  <!-- STUDY -->
  <section id="studyView" class="panel">
    <div class="study-head">
      <button class="back-btn" data-back="home">‹ 返回</button>
      <span id="studyCount">1 / 20</span>
      <div class="study-mode">
        <button class="mode active" data-study-mode="meaning">英→中</button>
        <button class="mode" data-study-mode="term">中→英</button>
      </div>
      <span id="cardType" class="type-tag">单词</span>
    </div>
    <div class="study-body">
      <div class="card-front" id="studyCardFront">
        <p id="cardPrompt" class="big-word">loading</p>
        <button id="frontSpeakButton" class="speak-btn">🔊 英</button>
        <button id="revealButton" class="reveal-btn">点击显示答案</button>
      </div>
      <div class="card-back" id="studyCardBack" hidden>
        <div id="cardAnswer"></div>
      </div>
    </div>
    <div class="study-foot">
      <div class="act-row">
        <button class="act again" data-quality="again">不认识</button>
        <button class="act hard" data-quality="hard">模糊</button>
        <button class="act easy" data-quality="easy">认识</button>
      </div>
      <div class="prog-bar"><i id="studyProgressBar"></i></div>
    </div>
  </section>

  <!-- LIBRARY -->
  <section id="libraryView" class="panel">
    <button class="back-btn" data-back="home">‹ 返回</button>
    <h2>词库</h2>
    <div class="filter-row">
      <button class="filt active" data-library-filter="all">全部</button>
      <button class="filt" data-library-filter="word">单词</button>
      <button class="filt" data-library-filter="phrase">短语</button>
    </div>
    <input type="text" id="librarySearch" class="search-input" placeholder="搜索…">
    <div id="libList" class="lib-list"></div>
    <div id="editPanel" hidden></div>
    <div class="card" style="margin-top:12px;">
      <h3>导入词库</h3>
      <select id="presetBankSelect" class="fld"></select>
      <p id="presetDescription" class="mini"></p>
      <p id="presetStats" class="mini"></p>
      <button id="importPresetButton" class="btn">导入</button>
      <button id="updatePresetButton" class="btn">更新</button>
      <button id="updateAllPresetsButton" class="btn-ghost">全部更新</button>
    </div>
    <form id="addItemForm" class="card" style="margin-top:8px;">
      <h3>添加词条</h3>
      <select id="itemType" class="fld"><option value="word">单词</option><option value="phrase">短语</option></select>
      <input id="itemTerm" class="fld" placeholder="单词或短语">
      <input id="itemMeaning" class="fld" placeholder="释义">
      <input id="itemExamMeaning" class="fld" placeholder="考试释义（可选）">
      <input id="itemCollocations" class="fld" placeholder="搭配，逗号分隔">
      <input id="itemExample" class="fld" placeholder="例句">
      <button id="formSubmitButton" class="btn">加入词库</button>
      <button id="cancelEditButton" class="btn-ghost" hidden>取消</button>
    </form>
    <input type="text" id="globalSearch" hidden>
  </section>

  <!-- READ -->
  <section id="readView" class="panel">
    <button class="back-btn" data-back="home">‹ 返回</button>
    <h2>阅读</h2>
    <select id="readWordSource" class="fld">
      <option value="due">今日待复习</option>
      <option value="weak">薄弱词</option>
      <option value="mastered">已掌握</option>
      <option value="all">全部词库</option>
    </select>
    <select id="readLength" class="fld">
      <option value="sentence">单句</option>
      <option value="short" selected>短文</option>
      <option value="medium">中篇</option>
    </select>
    <button id="generatePassageBtn" class="btn block">AI 生成文章</button>
    <div id="passageState" class="empty">点击生成，用学过的词生成文章</div>
    <div id="passageResult" hidden>
      <strong id="passageTitle"></strong>
      <button id="toggleTranslationBtn" class="btn-ghost">翻译</button>
      <article id="passageText" class="pg-body"></article>
      <div id="passageTranslation" class="pg-trans" hidden></div>
      <p class="mini">点击蓝色单词查看释义</p>
    </div>
    <div class="card">
      <strong>本文词表</strong>
      <div id="passageVocabList" class="chip-row"></div>
      <div id="passageWordDetail" hidden></div>
    </div>
  </section>

  <!-- ESSAY -->
  <section id="essayView" class="panel">
    <button class="back-btn" data-back="home">‹ 返回</button>
    <h2>AI 批改</h2>
    <div class="mode-row">
      <button class="mode active" data-essay-mode="text">打字</button>
      <button class="mode" data-essay-mode="image">拍照</button>
    </div>
    <textarea id="essayTextInput" class="fld ta" rows="10" placeholder="写英文作文…"></textarea>
    <div id="essayImageArea" hidden>
      <div id="dropZone" class="drop"><input id="essayImageInput" type="file" accept="image/*" hidden><div id="dropEmpty">点击上传图片</div><img id="essayPreview" alt="预览" hidden></div>
    </div>
    <input id="essayPrompt" class="fld" placeholder="题目/要求（可选）">
    <select id="targetLevel" class="fld">
      <option value="natural-simple">自然简单</option>
      <option value="easy">更简单可背</option>
      <option value="exam">偏考试表达</option>
    </select>
    <button id="reviewEssayButton" class="btn block">开始批改</button>
    <div id="reviewState" class="empty">写完点批改查看评分</div>
    <div id="reviewResult" hidden></div>
  </section>

  <!-- HABITS -->
  <section id="habitsView" class="panel">
    <button class="back-btn" data-back="home">‹ 返回</button>
    <h2>习惯分析</h2>
    <div id="habitSummary"></div>
    <h3>建议练习</h3>
    <div id="practiceList"></div>
  </section>

  <!-- SETTINGS -->
  <section id="settingsView" class="panel">
    <button class="back-btn" data-back="home">‹ 返回</button>
    <h2>设置</h2>
    <div class="card">
      <h3>AI 模型</h3>
      <label class="fld-lbl"><span>提供商</span><select id="providerSelect" class="fld"><option value="deepseek">DeepSeek</option><option value="openai">OpenAI</option></select></label>
      <label class="fld-lbl"><span>API Key</span><input id="apiKeyInput" class="fld" type="password" placeholder="sk-..."></label>
      <label class="fld-lbl"><span>模型</span><select id="modelSelect" class="fld"></select></label>
      <button id="saveSettingsButton" class="btn">保存</button>
      <button id="clearSettingsButton" class="btn-ghost">清除</button>
    </div>
    <div class="card">
      <h3>记忆间隔</h3>
      <label class="radio"><input type="radio" name="srsMode" id="srsModeEbbinghaus" value="ebbinghaus" checked> 艾宾浩斯</label>
      <label class="radio"><input type="radio" name="srsMode" id="srsModeCustom" value="custom"> 自定义</label>
      <input id="srsIntervalsInput" class="fld" value="1,2,4,7,14,30,60" hidden>
      <button id="saveSrsSettingsBtn" class="btn">保存</button>
    </div>
    <p class="mini" id="connectionInfo"></p>
    <button id="exportButton" class="btn-ghost">导出记录</button>
  </section>

</div>

<script src="presets.js" defer></script>
<script src="app.js" defer></script>
</body>
</html>
