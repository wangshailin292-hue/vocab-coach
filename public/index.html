<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>词句练习室</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- ===== TAB BAR (bottom nav, bubei-style) ===== -->
<nav class="tab-bar">
  <button class="tab-item active" data-view="study">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
    <span>复习</span>
  </button>
  <button class="tab-item" data-view="library">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
    <span>词库</span>
  </button>
  <button class="tab-item" data-view="read">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h12"/></svg>
    <span>阅读</span>
  </button>
  <button class="tab-item" data-view="essay">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
    <span>批改</span>
  </button>
  <button class="tab-item" data-view="settings">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
    <span>设置</span>
  </button>
</nav>

<!-- ===== PAGES ===== -->
<div class="pages">

  <!-- STUDY -->
  <section id="studyView" class="page active">
    <div class="study-screen">
      <div class="study-header">
        <span id="studyCount" class="study-hdr-count">1/20</span>
        <div class="segmented sm">
          <button class="segment active" data-study-mode="meaning">英→中</button>
          <button class="segment" data-study-mode="term">中→英</button>
        </div>
        <span id="cardType" class="study-hdr-tag">单词</span>
      </div>
      <div class="study-body">
        <div class="study-card-wrap">
          <div class="study-front" id="studyCardFront">
            <p id="cardPrompt" class="study-word">loading</p>
            <button id="autoSpeakButton" class="auto-speak-btn" type="button" hidden>开启自动朗读</button>
            <button id="revealButton" class="study-tap-btn">点击显示答案</button>
          </div>
          <div class="study-back" id="studyCardBack" hidden>
            <div id="cardAnswer"></div>
          </div>
        </div>
      </div>
      <div class="study-actions">
        <button class="act-btn again" data-quality="again">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
          <span>不认识</span>
        </button>
        <button class="act-btn hard" data-quality="hard">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
          <span>模糊</span>
        </button>
        <button class="act-btn easy" data-quality="easy">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><polyline points="8 12 11 15 16 9"/></svg>
          <span>认识</span>
        </button>
      </div>
      <div class="study-progress"><span id="studyProgressBar"></span></div>
    </div>
  </section>

  <!-- LIBRARY -->
  <section id="libraryView" class="page">
    <div class="page-inner">
      <div class="page-top">
        <h2>词库</h2>
        <div class="segmented sm">
          <button class="segment active" data-library-filter="all">全部</button>
          <button class="segment" data-library-filter="word">单词</button>
          <button class="segment" data-library-filter="phrase">短语</button>
        </div>
        <label class="search-box" for="globalSearch">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="10" cy="10" r="7"/><line x1="21" y1="21" x2="15" y2="15"/></svg>
          <input id="globalSearch" type="search" placeholder="搜索">
        </label>
      </div>

      <section class="preset-box">
        <div class="preset-head"><strong>现成词库</strong><span>四级 · 六级 · 雅思</span></div>
        <select id="presetBankSelect"></select>
        <p id="presetDescription" class="mini-note"></p>
        <div id="presetStats" class="preset-stats"></div>
        <div class="preset-actions">
          <button id="importPresetButton" class="btn-primary sm">导入所选</button>
          <button id="updatePresetButton" class="btn-ghost sm">更新所选</button>
          <button id="updateAllPresetsButton" class="btn-ghost sm">更新全部</button>
        </div>
      </section>

      <details class="add-word-section">
        <summary>添加单词/短语</summary>
        <form id="addItemForm" class="stacked-form">
          <select id="itemType"><option value="word">单词</option><option value="phrase">短语</option></select>
          <input id="itemTerm" required maxlength="80" placeholder="英文">
          <input id="itemMeaning" required maxlength="120" placeholder="中文意思">
          <input id="itemExamMeaning" maxlength="160" placeholder="常考意思">
          <textarea id="itemCollocations" rows="2" placeholder="常用搭配，每行一个"></textarea>
          <textarea id="itemExample" rows="2" required placeholder="例句"></textarea>
          <div class="form-actions">
            <button id="formSubmitButton" class="btn-primary sm" type="submit">加入词库</button>
            <button id="cancelEditButton" class="btn-ghost sm" type="button" hidden>取消</button>
          </div>
        </form>
      </details>

      <div id="libraryList" class="lib-list"></div>
    </div>
  </section>

  <!-- READ -->
  <section id="readView" class="page">
    <div class="page-inner">
      <div class="page-top"><h2>阅读</h2></div>
      <div class="read-controls">
        <select id="readWordSource">
          <option value="due">今日待复习</option>
          <option value="weak">薄弱词</option>
          <option value="mastered">已掌握</option>
          <option value="all">全部词库</option>
        </select>
        <select id="readLength">
          <option value="sentence">单句</option>
          <option value="short" selected>短文</option>
          <option value="medium">中篇</option>
        </select>
        <button id="generatePassageBtn" class="btn-primary sm">AI 生成</button>
      </div>
      <div id="passageState" class="empty-block">点击 AI 生成，用你学过的词生成文章</div>
      <div id="passageResult" hidden>
        <div class="passage-head">
          <strong id="passageTitle"></strong>
          <button id="toggleTranslationBtn" class="btn-ghost sm">翻译</button>
        </div>
        <article id="passageText" class="passage-body"></article>
        <div id="passageTranslation" class="passage-trans" hidden></div>
        <div class="passage-hint">点击蓝色单词查看意思和标记</div>
      </div>
      <div class="passage-vocab-panel">
        <strong>本文词表</strong>
        <div id="passageVocabList" class="chip-row"></div>
        <div id="passageWordDetail" hidden></div>
      </div>
    </div>
  </section>

  <!-- ESSAY -->
  <section id="essayView" class="page">
    <div class="page-inner">
      <div class="page-top"><h2>AI 批改</h2></div>
      <div class="segmented sm essay-mode-switch">
        <button class="segment active" data-essay-mode="text">打字</button>
        <button class="segment" data-essay-mode="image">拍照</button>
      </div>
      <div id="essayTextArea">
        <textarea id="essayTextInput" rows="12" placeholder="在这里写你的英文作文..."></textarea>
      </div>
      <div id="essayImageArea" hidden>
        <div id="dropZone" class="drop-zone">
          <input id="essayImageInput" type="file" accept="image/*" hidden>
          <div id="dropEmpty"><strong>点击上传作文图片</strong></div>
          <img id="essayPreview" alt="预览" hidden>
        </div>
      </div>
      <div class="essay-options">
        <input id="essayPrompt" placeholder="题目/要求（可选）">
        <select id="targetLevel">
          <option value="natural-simple">自然简单</option>
          <option value="easy">更简单可背</option>
          <option value="exam">偏考试表达</option>
        </select>
      </div>
      <button id="reviewEssayButton" class="btn-primary full-width">开始批改</button>
      <div id="reviewState" class="empty-block review-state">写完或拍照后，点批改查看评分和纠错</div>
      <div id="reviewResult" hidden></div>
    </div>
  </section>

  <!-- SETTINGS -->
  <section id="settingsView" class="page">
    <div class="page-inner">
      <div class="page-top"><h2>设置</h2></div>
      <div class="setting-card">
        <strong>AI 模型</strong>
        <label class="field">
          <span>提供商</span>
          <select id="providerSelect">
            <option value="deepseek">DeepSeek</option>
            <option value="openai">OpenAI</option>
          </select>
        </label>
        <label class="field">
          <span>API Key</span>
          <input id="apiKeyInput" type="password" autocomplete="off" placeholder="sk-...">
        </label>
        <label class="field">
          <span>模型</span>
          <select id="modelSelect"></select>
        </label>
        <div class="setting-actions">
          <button id="saveSettingsButton" class="btn-primary sm">保存</button>
          <button id="clearSettingsButton" class="btn-ghost sm">清除</button>
        </div>
      </div>
      <div class="setting-card setting-card-gap">
        <strong>记忆间隔</strong>
        <p class="mini-note">默认艾宾浩斯曲线，可自定义间隔天数</p>
        <label class="radio-row"><input type="radio" name="srsMode" id="srsModeEbbinghaus" value="ebbinghaus" checked> 艾宾浩斯 (1,2,4,7,14,30,60天)</label>
        <label class="radio-row"><input type="radio" name="srsMode" id="srsModeCustom" value="custom"> 自定义</label>
        <input id="srsIntervalsInput" type="text" value="1,2,4,7,14,30,60" placeholder="1,2,4,7,14,30,60" hidden>
        <button id="saveSrsSettingsBtn" class="btn-primary sm save-srs-btn">保存间隔</button>
      </div>
      <p class="mini-note connection-note"><span id="connectionTitle"></span> · <span id="connectionDetail"></span></p>
      <button id="exportButton" class="btn-ghost sm export-btn">导出记录</button>
    </div>
  </section>

</div>

<script src="presets.js" defer></script>
<script src="app.js" defer></script>
</body>
</html>
