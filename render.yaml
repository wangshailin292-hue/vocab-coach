services:
  - type: web
    name: vocab-coach
    runtime: node
    plan: free
    buildCommand: ""
    startCommand: "npm start"
    healthCheckPath: "/healthz"
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 10000
